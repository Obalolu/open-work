# Writing Style — Narrative
# Story-based introductions. More engaging, less dry.
# Tuned for academic papers that read like human-written research.

tone: "engaging and accessible"
formality: 0.65
temperature: 0.75
preferred_voice: "active"
introduction_style: "rhetorical_question"
max_bullet_points_per_section: 3

forbidden_phrases:
  # Common AI patterns
  - "delve into"
  - "landscape"
  - "realm"
  - "tapestry"
  - "pivotal"
  - "synergy"
  - "leverage"
  - "utilize"
  - "in order to"
  - "facilitate"
  - "endeavor"
  - "myriad"
  - "underscore"
  - "furthermore"
  - "moreover"
  - "additionally"
  - "consequently"
  - "it is worth noting"
  - "it is important to note"
  - "in today's world"
  - "in this day and age"
  - "cutting-edge"
  - "groundbreaking"
  - "paradigm shift"
  - "revolutionary"
  # Overused academic AI patterns
  - "imagine a scenario"
  - "have you ever wondered"
  - "this underscores"
  - "it is essential to recognize"
  - "this real-world application"
  - "the integration of"
  - "the transformative potential"
  - "as hospitals increasingly"
  - "the importance of understanding"
  - "gained considerable momentum"
  - "despite the enthusiasm"
  - "it is essential to"
  - "plays a critical role"
  - "significant implications"
  - "growing reliance on"
  - "increasingly recognized"
  - "has emerged as"
  - "has garnered attention"
  # Word-level patterns to avoid
  - "furthermore"
  - "moreover"
  - "additionally"
  - "subsequently"
  - "in summary"
  - "in conclusion"
  - "to summarize"
  - "overall"

preferred_starting_words:
  - "For"
  - "In"
  - "Recent"
  - "Among"
  - "University"
  - "Students"
  - "Research"
  - "The"
  - "With"
  - "Despite"
  - "Although"
  - "While"
  - "Beyond"
  - "Unlike"

avoid_starting_words:
  - "Imagine"
  - "Furthermore"
  - "Moreover"
  - "Additionally"
  - "Consequently"
  - "Subsequently"
  - "Interestingly"
  - "Notably"
  - "Importantly"
