version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./jobs:/app/jobs
      - ./prompts:/app/prompts
      - ./src:/app/src
      - ./api:/app/api
    environment:
      - OPENWORK_API_KEY=${OPENWORK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENALEX_API_KEY=${OPENALEX_API_KEY}
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped
